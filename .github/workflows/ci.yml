name: CI

on:
  push:
    branches: [main, feature/**, chore/**, hotfix/**]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Dependency audit
        run: npm audit --audit-level=critical

      - name: Lint
        run: npm run lint

      - name: Typecheck
        id: typecheck
        continue-on-error: true
        run: npm run typecheck -- --pretty false 2>&1 | tee typecheck.log

      - name: Upload TypeScript diagnostics
        if: steps.typecheck.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: typecheck-diagnostics
          path: typecheck.log
          retention-days: 3

      - name: Fail on TypeScript errors
        if: steps.typecheck.outcome == 'failure'
        run: exit 1

      - name: Tests
        id: tests
        continue-on-error: true
        run: npm test 2>&1 | tee test.log

      - name: Upload test diagnostics
        if: steps.tests.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: test-diagnostics
          path: test.log
          retention-days: 3

      - name: Fail on test errors
        if: steps.tests.outcome == 'failure'
        run: exit 1

      - name: Production build
        run: npm run build
