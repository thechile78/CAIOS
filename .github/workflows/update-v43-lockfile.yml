name: Update v4.3 lockfile

on:
  workflow_dispatch:
  push:
    branches: [feature/v4.3-auth-role-access]
    paths: [package.json]

permissions:
  contents: write

jobs:
  lockfile:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/v4.3-auth-role-access
          persist-credentials: true
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Generate and verify genuine lockfile
        run: |
          npm install --package-lock-only --ignore-scripts --no-audit --no-fund
          npm ci --ignore-scripts --no-audit --no-fund
      - name: Commit lockfile only
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git diff --cached --quiet || git commit -m "chore: update lockfile for Supabase auth dependencies"
          git push origin HEAD:feature/v4.3-auth-role-access
