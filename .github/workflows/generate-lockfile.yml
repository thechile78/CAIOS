name: Generate and commit verified lockfile

on:
  workflow_dispatch:
  push:
    branches: [chore/add-lockfile-and-ci]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: chore/add-lockfile-and-ci
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate genuine package-lock.json
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund

      - name: Verify lockfile with npm ci
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Update CI for deterministic installs
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('.github/workflows/ci.yml')
          text = path.read_text()
          if 'cache: npm' not in text:
              text = text.replace('node-version: 22\n', 'node-version: 22\n          cache: npm\n', 1)
          text = text.replace('npm install --no-audit --no-fund', 'npm ci --no-audit --no-fund', 1)
          path.write_text(text)
          PY

      - name: Commit verified changes and report diagnostics
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json .github/workflows/ci.yml
          git commit -m "chore: add verified package lockfile and use npm ci" > commit.log 2>&1
          commit_status=$?
          git push origin HEAD:chore/add-lockfile-and-ci > push.log 2>&1
          push_status=$?
          {
            echo "### Lockfile workflow diagnostic"
            echo
            echo "- Commit status: ${commit_status}"
            echo "- Push status: ${push_status}"
            echo
            echo '<details><summary>Commit output</summary>'
            echo
            echo '```text'
            cat commit.log
            echo '```'
            echo '</details>'
            echo
            echo '<details><summary>Push output</summary>'
            echo
            echo '```text'
            cat push.log
            echo '```'
            echo '</details>'
          } > diagnostic.md
          gh pr comment 12 --body-file diagnostic.md
          if [ "$commit_status" -ne 0 ] || [ "$push_status" -ne 0 ]; then
            exit 1
          fi

# Diagnostic run after workflow write permission was enabled.
