name: Generate and commit verified lockfile

on:
  workflow_dispatch:
  push:
    branches: [chore/add-lockfile-and-ci]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: chore/add-lockfile-and-ci
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate genuine package-lock.json
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund

      - name: Verify lockfile with npm ci
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Commit verified lockfile
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git commit -m "chore: add verified package lockfile" > commit.log 2>&1
          commit_status=$?
          git push origin HEAD:chore/add-lockfile-and-ci > push.log 2>&1
          push_status=$?
          {
            echo "### Lockfile-only workflow diagnostic"
            echo
            echo "- Commit status: ${commit_status}"
            echo "- Push status: ${push_status}"
            echo
            echo '<details><summary>Commit output</summary>'
            echo
            echo '```text'
            cat commit.log
            echo '```'
            echo '</details>'
            echo
            echo '<details><summary>Push output</summary>'
            echo
            echo '```text'
            cat push.log
            echo '```'
            echo '</details>'
          } > diagnostic.md
          gh pr comment 12 --body-file diagnostic.md
          if [ "$commit_status" -ne 0 ] || [ "$push_status" -ne 0 ]; then
            exit 1
          fi

# The workflow intentionally commits only package-lock.json. CI workflow changes are applied separately by the repository integration.
