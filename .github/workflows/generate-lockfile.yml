name: Generate and commit verified lockfile

on:
  workflow_dispatch:
  push:
    branches: [chore/add-lockfile-and-ci]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: chore/add-lockfile-and-ci

      - name: Stop when lockfile already exists
        id: lockfile
        run: |
          if [ -f package-lock.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.lockfile.outputs.exists == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate genuine package-lock.json
        if: steps.lockfile.outputs.exists == 'false'
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund

      - name: Verify lockfile with npm ci
        if: steps.lockfile.outputs.exists == 'false'
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Commit verified lockfile through GitHub API
        if: steps.lockfile.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          encoded=$(base64 -w0 package-lock.json)
          gh api --method PUT \
            "repos/${GITHUB_REPOSITORY}/contents/package-lock.json" \
            -f message='chore: add verified package lockfile' \
            -f branch='chore/add-lockfile-and-ci' \
            -f content="$encoded"
